<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Analytics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-blue: #0d6efd; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .main-container { max-width: 1600px; margin: 20px auto; padding: 0 20px; }
        
        /* Stream Container - Video + Analytics Side by Side */
        .stream-container { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 20px; 
            background: white; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        /* Video Section - Fixed Size */
        .video-section { 
            flex-shrink: 0; 
            width: 640px; 
        }
        .video-card { 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 2px solid #e0e0e0; 
        }
        .video-container { 
            background: #000; 
            width: 640px; 
            height: 360px; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .live-frame { 
            width: 640px; 
            height: 360px; 
            object-fit: contain; 
        }
        
        /* Analytics Section - Flexible */
        .analytics-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .stats-card { 
            background: #f8f9fa; 
            border-radius: 8px; 
            padding: 15px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
        }
        .stats-list { 
            flex: 1; 
            overflow-y: auto; 
            font-size: 0.85rem; 
            margin-top: 10px; 
        }
        .count-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 10px; 
            margin-bottom: 5px; 
            background: white; 
            border-left: 3px solid var(--primary-blue); 
            border-radius: 4px; 
        }

        /* Upload area */
        .upload-bar { 
            background: white; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        
        .hidden { display: none !important; }
        .progress { height: 6px; }
        .overlay { 
            position: absolute; 
            background: rgba(0,0,0,0.6); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            top: 10px; 
            right: 10px; 
        }
        
        /* Class Filter Styles */
        .filter-section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .class-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .class-guide {
            margin-top: 8px;
            margin-bottom: 0;
            font-size: 0.85rem;
            color: #6c757d;
        }
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .class-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: #f8f9fa;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .class-checkbox:hover {
            border-color: var(--primary-blue);
            background: #e7f3ff;
        }
        .class-checkbox input[type="checkbox"] {
            cursor: pointer;
        }
        .class-checkbox.checked {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .demo-section {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .demo-video {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            background: #000;
            display: block;
        }
        #demoBtn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            border: none;
            font-weight: 600;
            box-shadow: 0 6px 14px rgba(34, 197, 94, 0.35);
        }
        #demoBtn:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: #fff;
            transform: translateY(-1px);
        }
        
        /* Video Modal Styles */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            cursor: pointer;
        }
        .video-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-video {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10001;
        }
        .modal-close:hover {
            color: #ccc;
        }
        .video-container {
            cursor: zoom-in;
        }
        .video-container:hover {
            opacity: 0.9;
        }

        /* Responsive layout */
        @media (max-width: 992px) {
            .main-container {
                padding: 0 12px;
                margin: 12px auto;
            }

            .main-container > header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 12px;
            }

            .upload-bar {
                width: 100%;
                flex-wrap: wrap;
            }

            .upload-bar input[type="file"] {
                width: 100% !important;
                min-width: 220px;
            }
            .filter-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .stream-container {
                flex-direction: column;
                padding: 12px;
                gap: 12px;
            }

            .video-section,
            .analytics-section {
                width: 100%;
                flex: 1 1 auto;
            }

            .video-container,
            .live-frame {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
            }

            .stats-card {
                min-height: 260px;
            }
        }

        @media (max-width: 576px) {
            .class-filters {
                gap: 6px;
            }

            .class-checkbox {
                padding: 4px 10px;
                font-size: 0.8rem;
            }

            .overlay {
                font-size: 0.72rem;
                padding: 4px 8px;
            }
            .filter-actions .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="fw-bold mb-0 text-dark"><i class="fas fa-microchip text-primary me-2"></i>Traffic AI</h3>
            <p class="text-muted small mb-0">Real-time Traffic Detection & Tracking</p>
        </div>
        <div class="upload-bar shadow-sm">
            <span class="small text-muted">Upload video(s):</span>
            <input type="file" id="videoInput" class="form-control form-control-sm" style="width: 250px;" multiple accept="video/*">
            <button class="btn btn-primary btn-sm" id="startBtn">Start Analysis</button>
            <button class="btn btn-outline-success btn-sm" id="demoBtn">See Demo</button>
        </div>
    </header>

    <!-- Class Filter Section -->
    <div class="filter-section">
        <div class="filter-header">
            <h6 class="fw-bold mb-0"><i class="fas fa-filter me-2"></i>Filter Object Classes</h6>
            <div class="filter-actions">
                <button class="btn btn-sm btn-outline-primary" id="selectAllBtn">Select All</button>
                <button class="btn btn-sm btn-outline-secondary" id="deselectAllBtn">Deselect All</button>
            </div>
        </div>
        <p class="class-guide">
            <i class="fas fa-info-circle me-1"></i>
            Please select class(es) first, then click <strong>See Demo</strong> or <strong>Start Analysis</strong>.
        </p>
        <div class="class-filters" id="classFilters"></div>
    </div>

    <!-- Dynamic Stream Containers -->
    <div id="streamsContainer"></div>
</div>

<!-- Video Enlarge Modal -->
<div class="video-modal" id="videoModal">
    <div class="modal-close" id="modalClose">&times;</div>
    <img class="modal-video" id="modalVideo" src="" alt="Enlarged Video">
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const startBtn = document.getElementById('startBtn');
    const demoBtn = document.getElementById('demoBtn');
    const streamsContainer = document.getElementById('streamsContainer');
    const classFilters = document.getElementById('classFilters');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    
    // Modal elements
    const videoModal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideo');
    const modalClose = document.getElementById('modalClose');
    
    let charts = [];
    let activeJobs = [];
    let availableClasses = [];

    // Modal functionality
    function setupVideoModal() {
        // Close modal when clicking close button
        modalClose.onclick = closeModal;
        
        // Close modal when clicking outside video
        videoModal.onclick = function(e) {
            if (e.target === videoModal) {
                closeModal();
            }
        };
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && videoModal.classList.contains('active')) {
                closeModal();
            }
        });
    }
    
    // Track which slot is currently enlarged
    let enlargedSlotIndex = null;
    
    function openModal(slotIndex) {
        enlargedSlotIndex = slotIndex;
        const frame = document.getElementById(`frame-${slotIndex}`);
        if (frame && frame.src) {
            modalVideo.src = frame.src;
        }
        videoModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        enlargedSlotIndex = null;
        videoModal.classList.remove('active');
        modalVideo.src = '';
        document.body.style.overflow = '';
    }
    
    // Update modal if it's showing this slot's video
    function updateModalIfActive(slotIndex, src) {
        if (enlargedSlotIndex === slotIndex && videoModal.classList.contains('active')) {
            modalVideo.src = src;
        }
    }
    
    // Add click event to video containers
    function addVideoClickListener(slotIndex) {
        const container = document.getElementById(`container-${slotIndex}`);
        const frame = document.getElementById(`frame-${slotIndex}`);
        
        container.onclick = function() {
            if (frame.src && !frame.classList.contains('hidden')) {
                openModal(slotIndex);
            }
        };
    }

    // Load available classes on page load
    async function loadClasses() {
        try {
            const response = await fetch('/classes');
            const data = await response.json();
            availableClasses = data.classes;
            renderClassFilters();
        } catch (err) {
            console.error('Failed to load classes:', err);
        }
    }

    function renderClassFilters() {
        classFilters.innerHTML = '';
        availableClasses.forEach(className => {
            const label = document.createElement('label');
            label.className = 'class-checkbox checked';
            label.innerHTML = `
                <input type="checkbox" name="class" value="${className}" checked>
                <span>${className}</span>
            `;
            
            const checkbox = label.querySelector('input');
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    label.classList.add('checked');
                } else {
                    label.classList.remove('checked');
                }
            });
            
            classFilters.appendChild(label);
        });
    }

    selectAllBtn.onclick = () => {
        document.querySelectorAll('.class-checkbox input').forEach(cb => {
            cb.checked = true;
            cb.closest('.class-checkbox').classList.add('checked');
        });
    };

    deselectAllBtn.onclick = () => {
        document.querySelectorAll('.class-checkbox input').forEach(cb => {
            cb.checked = false;
            cb.closest('.class-checkbox').classList.remove('checked');
        });
    };

    function getSelectedClasses() {
        const selected = Array.from(document.querySelectorAll('.class-checkbox input:checked'))
            .map(cb => cb.value);
        return selected.length > 0 ? selected.join(',') : 'all';
    }

    startBtn.onclick = async () => {
        const files = videoInput.files;
        if (files.length === 0) return alert('Please select at least one video.');
        
        const selectedClasses = getSelectedClasses();
        if (selectedClasses === 'all' || selectedClasses === '') {
            return alert('Please select at least one class to detect.');
        }
        
        // Clear existing streams
        streamsContainer.innerHTML = '';
        charts = [];
        activeJobs = [];
        
        // Create and start stream for each video
        for (let i = 0; i < files.length; i++) {
            createStreamSlot(i);
            addVideoClickListener(i); // Add click listener for modal
            activeJobs.push(false);
            charts.push(null);
            runSlot(i, files[i], selectedClasses);
        }
    };

    demoBtn.onclick = async () => {
        const selectedClasses = getSelectedClasses();
        if (selectedClasses === 'all' || selectedClasses === '') {
            return alert('Please select at least one class to detect.');
        }

        streamsContainer.innerHTML = '';
        charts = [];
        activeJobs = [];

        createStreamSlot(0);
        addVideoClickListener(0);
        activeJobs.push(false);
        charts.push(null);
        runDemoSlot(0, selectedClasses);
    };

    // Load classes and setup modal when page loads
    loadClasses();
    setupVideoModal();

    function createStreamSlot(slotIndex) {
        const streamHTML = `
            <div class="stream-container">
                <!-- Video Section -->
                <div class="video-section">
                    <div class="video-card">
                        <div class="video-container" id="container-${slotIndex}">
                            <img id="frame-${slotIndex}" class="live-frame hidden">
                            <div id="placeholder-${slotIndex}" class="text-muted small"><i class="fas fa-video fa-2x mb-2"></i><br>Stream ${slotIndex + 1} Ready</div>
                            <div id="overlay-${slotIndex}" class="overlay hidden">0%</div>
                            <div class="position-absolute" style="bottom: 10px; left: 10px; color: rgba(255,255,255,0.7); font-size: 12px;">
                                <i class="fas fa-expand-alt me-1"></i>Click to enlarge
                            </div>
                        </div>
                        <div class="p-2 border-top">
                            <div class="progress mb-1"><div id="bar-${slotIndex}" class="progress-bar" style="width: 0%"></div></div>
                            <div class="d-flex justify-content-between small"><span id="name-${slotIndex}" class="text-truncate" style="max-width: 400px;">---</span><span id="status-${slotIndex}" class="badge bg-secondary">Idle</span></div>
                        </div>
                    </div>
                </div>
                
                <!-- Analytics Section -->
                <div class="analytics-section">
                    <div class="stats-card">
                        <h6 class="fw-bold border-bottom pb-2 mb-2"><i class="fas fa-chart-bar me-2"></i>Stream ${slotIndex + 1} Analytics</h6>
                        <canvas id="chart-${slotIndex}" height="120"></canvas>
                        <div class="stats-list" id="list-${slotIndex}"></div>
                    </div>
                </div>
            </div>
        `;
        streamsContainer.insertAdjacentHTML('beforeend', streamHTML);
    }

    async function runSlot(slotIndex, file, selectedClasses) {
        if (activeJobs[slotIndex]) return;
        activeJobs[slotIndex] = true;

        // Reset UI for slot
        const frame = document.getElementById(`frame-${slotIndex}`);
        const placeholder = document.getElementById(`placeholder-${slotIndex}`);
        const bar = document.getElementById(`bar-${slotIndex}`);
        const nameLabel = document.getElementById(`name-${slotIndex}`);
        const statusBadge = document.getElementById(`status-${slotIndex}`);
        const overlay = document.getElementById(`overlay-${slotIndex}`);
        const listContainer = document.getElementById(`list-${slotIndex}`);

        nameLabel.innerText = file.name;
        statusBadge.innerText = 'Uploading...';
        statusBadge.className = 'badge bg-warning text-dark';
        placeholder.classList.add('hidden');
        frame.classList.remove('hidden');
        overlay.classList.remove('hidden');

        // Frame queue for continuous playback
        const frameQueue = [];
        let isPlaying = false;
        let targetFps = 15;  // Default, will be updated from server
        let frameDelay = 1000 / targetFps;

        // Continuous frame player - plays at target FPS
        async function playFrames() {
            if (isPlaying) return;
            isPlaying = true;

            while (frameQueue.length > 0 || activeJobs[slotIndex]) {
                if (frameQueue.length > 0) {
                    const frameData = frameQueue.shift();
                    const imgSrc = "data:image/jpeg;base64," + frameData.frame;
                    frame.src = imgSrc;
                    bar.style.width = frameData.progress + '%';
                    overlay.innerText = frameData.progress + '% | Buffer: ' + frameQueue.length;
                    updateAnalytics(slotIndex, frameData.counts);
                    
                    // Update modal if this slot is enlarged
                    updateModalIfActive(slotIndex, imgSrc);
                    
                    await new Promise(resolve => setTimeout(resolve, frameDelay));
                } else {
                    // Wait for more frames (short wait)
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            }
            isPlaying = false;
        }

        // Upload with selected classes
        const formData = new FormData();
        formData.append('video', file);
        formData.append('selected_classes', selectedClasses);
        
        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            
            // Connect WebSocket
            statusBadge.innerText = 'Tracking';
            statusBadge.className = 'badge bg-primary';
            
            const ws_protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socket = new WebSocket(`${ws_protocol}//${window.location.host}/ws/${data.job_id}`);

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.status === 'processing' && msg.frame) {
                    if (msg.target_fps) {
                        targetFps = msg.target_fps;
                        frameDelay = 1000 / targetFps;
                    }
                    frameQueue.push(msg);
                    if (!isPlaying) {
                        playFrames();
                    }
                } else if (msg.status === 'completed') {
                    statusBadge.innerText = 'Done';
                    statusBadge.className = 'badge bg-success';
                    if (msg.counts) updateAnalytics(slotIndex, msg.counts);
                    socket.close();
                }
            };

            socket.onclose = () => {
                activeJobs[slotIndex] = false;
                overlay.classList.add('hidden');
            };

        } catch (err) {
            statusBadge.innerText = 'Error';
            statusBadge.className = 'badge bg-danger';
            activeJobs[slotIndex] = false;
        }
    }

    async function runDemoSlot(slotIndex, selectedClasses) {
        if (activeJobs[slotIndex]) return;
        activeJobs[slotIndex] = true;

        const frame = document.getElementById(`frame-${slotIndex}`);
        const placeholder = document.getElementById(`placeholder-${slotIndex}`);
        const bar = document.getElementById(`bar-${slotIndex}`);
        const nameLabel = document.getElementById(`name-${slotIndex}`);
        const statusBadge = document.getElementById(`status-${slotIndex}`);
        const overlay = document.getElementById(`overlay-${slotIndex}`);

        nameLabel.innerText = 'demo.mp4';
        statusBadge.innerText = 'Preparing demo...';
        statusBadge.className = 'badge bg-warning text-dark';
        placeholder.classList.add('hidden');
        frame.classList.remove('hidden');
        overlay.classList.remove('hidden');

        const frameQueue = [];
        let isPlaying = false;
        let targetFps = 15;
        let frameDelay = 1000 / targetFps;

        async function playFrames() {
            if (isPlaying) return;
            isPlaying = true;

            while (frameQueue.length > 0 || activeJobs[slotIndex]) {
                if (frameQueue.length > 0) {
                    const frameData = frameQueue.shift();
                    const imgSrc = "data:image/jpeg;base64," + frameData.frame;
                    frame.src = imgSrc;
                    bar.style.width = frameData.progress + '%';
                    overlay.innerText = frameData.progress + '% | Buffer: ' + frameQueue.length;
                    updateAnalytics(slotIndex, frameData.counts);
                    updateModalIfActive(slotIndex, imgSrc);
                    await new Promise(resolve => setTimeout(resolve, frameDelay));
                } else {
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            }
            isPlaying = false;
        }

        const formData = new FormData();
        formData.append('selected_classes', selectedClasses);

        try {
            const response = await fetch('/demo-job', { method: 'POST', body: formData });
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || 'Failed to create demo job');

            nameLabel.innerText = data.video_name || 'demo.mp4';
            statusBadge.innerText = 'Tracking Demo';
            statusBadge.className = 'badge bg-primary';

            const ws_protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const socket = new WebSocket(`${ws_protocol}//${window.location.host}/ws/${data.job_id}`);

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.status === 'processing' && msg.frame) {
                    if (msg.target_fps) {
                        targetFps = msg.target_fps;
                        frameDelay = 1000 / targetFps;
                    }
                    frameQueue.push(msg);
                    if (!isPlaying) playFrames();
                } else if (msg.status === 'completed') {
                    statusBadge.innerText = 'Done';
                    statusBadge.className = 'badge bg-success';
                    if (msg.counts) updateAnalytics(slotIndex, msg.counts);
                    socket.close();
                }
            };

            socket.onclose = () => {
                activeJobs[slotIndex] = false;
                overlay.classList.add('hidden');
            };
        } catch (err) {
            statusBadge.innerText = 'Error';
            statusBadge.className = 'badge bg-danger';
            activeJobs[slotIndex] = false;
            alert(`Demo failed: ${err.message || err}`);
        }
    }

    function updateAnalytics(slot, counts) {
        const labels = Object.keys(counts);
        const values = Object.values(counts);
        
        // List update
        let html = '';
        labels.forEach(k => {
            html += `<div class="count-item"><span>${k}</span><span class="text-primary fw-bold">${counts[k]}</span></div>`;
        });
        document.getElementById(`list-${slot}`).innerHTML = html;

        // Chart update
        if (!charts[slot]) {
            const ctx = document.getElementById(`chart-${slot}`).getContext('2d');
            charts[slot] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Objects', data: values, backgroundColor: '#0d6efd' }]
                },
                options: { 
                    responsive: true, 
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, grid: { display: false } } },
                    animation: { duration: 0 }
                }
            });
        } else {
            charts[slot].data.labels = labels;
            charts[slot].data.datasets[0].data = values;
            charts[slot].update();
        }
    }
</script>
</body>
</html>
